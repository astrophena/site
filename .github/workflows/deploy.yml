name: "Deploy"
on:
  push:
    branches: ["master"]
  workflow_dispatch:
permissions:
  id-token: "write"
  contents: "read"
concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true
jobs:
  site:
    name: "Site"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Check out"
        uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0" # v7.0.0
      - name: "Set up Go"
        uses: "actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16" # v6.5.0
        with:
          go-version-file: "go.mod"
      - name: "Build"
        run: |
          go tool build -prod
          tar -czf archive.tar.gz -C build .
      - name: "Deploy"
        run: "go tool deploy -type site astrophena.name archive.tar.gz"
  vanity:
    name: "Vanity"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Check out"
        uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0" # v7.0.0
      - name: "Set up Go"
        uses: "actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16" # v6.5.0
        with:
          go-version-file: "go.mod"
      - name: "Restore vanity repo cache"
        uses: "actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae" # v5.0.5
        with:
          path: ".cache/vanity/repos"
          key: "${{ runner.os }}-vanity-repos-v1"
      - name: "Build"
        env:
          GITHUB_TOKEN: "${{ github.token }}"
          VANITY_REPO_CACHE_DIR: ".cache/vanity/repos"
          VANITY_CONCURRENCY: "4"
        run: |
          go tool build -vanity
          tar -czf archive.tar.gz -C build .
      - name: "Deploy"
        run: "go tool deploy -type site go.astrophena.name archive.tar.gz"
