name: "Deploy"
on:
  push:
    branches: ["master"]
  workflow_dispatch:
permissions:
  id-token: "write"
  contents: "read"
concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true
jobs:
  site:
    name: "Site"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Check out"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2
      - name: "Set up Go"
        uses: "actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c" # v6.4.0
        with:
          go-version-file: "go.mod"
      - name: "Build"
        run: |
          go tool build -prod
          tar -czf archive.tar.gz -C build .
      - name: "Deploy"
        run: "go tool deploy -type site astrophena.name archive.tar.gz"
  vanity:
    name: "Vanity"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Check out"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2
      - name: "Set up Go"
        uses: "actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c" # v6.4.0
        with:
          go-version-file: "go.mod"
      - name: "Restore vanity repo cache"
        uses: "actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae" # v5.0.5
        with:
          path: ".cache/vanity/repos"
          key: "${{ runner.os }}-vanity-repos-v1"
      - name: "Build"
        env:
          GITHUB_TOKEN: "${{ secrets.VANITY_GITHUB_TOKEN }}"
          VANITY_REPO_CACHE_DIR: ".cache/vanity/repos"
          VANITY_CONCURRENCY: "4"
        run: |
          go tool build -vanity
          tar -czf archive.tar.gz -C build .
      - name: "Deploy"
        run: "go tool deploy -type site go.astrophena.name archive.tar.gz"
